<!DOCTYPE html>
<html>
<head>
  <title>Advanced Product Table</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="add-product.html">Add Product</a>
  <a href="view-products.html">View Products</a>
</div>

<!-- MAIN -->
<div class="main">
  <h1>Product List</h1>

  <!-- SEARCH + SORT -->
  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
    <input type="text" id="search" placeholder="🔍 Search..." onkeyup="filterProducts()">
    
    <select onchange="sortProducts(this.value)">
      <option value="">Sort By</option>
      <option value="low">Price Low → High</option>
      <option value="high">Price High → Low</option>
    </select>
  </div>

  <!-- TABLE -->
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </div>

  <!-- PAGINATION -->
  <div id="pagination" style="margin-top:15px;"></div>
</div>

<!-- EDIT MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:white; padding:20px; width:300px; margin:100px auto; border-radius:10px;">
    <h3>Edit Product</h3>
    <input type="text" id="editName">
    <input type="number" id="editPrice">
    <button onclick="updateProduct()">Update</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- API + AUTH -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>

<script>
checkAuth();

let allProducts = [];
let currentPage = 1;
let itemsPerPage = 5;
let editIndex = null;

// LOAD PRODUCTS FROM BACKEND
async function loadProducts() {
  try {
    const data = await apiRequest("/products");
    allProducts = data.products;
    displayProducts();
  } catch (err) {
    console.log(err);
  }
}

// DISPLAY WITH PAGINATION
function displayProducts() {
  let start = (currentPage - 1) * itemsPerPage;
  let paginated = allProducts.slice(start, start + itemsPerPage);

  let rows = "";

  paginated.forEach((p, index) => {
    rows += `
      <tr>
        <td>${p.name}</td>
        <td>₹ ${p.price}</td>
        <td>
          <button onclick="openEdit(${start + index})">Edit</button>
          <button onclick="deleteProduct(${start + index})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("productTable").innerHTML = rows;
  renderPagination();
}

// FILTER
function filterProducts() {
  let search = document.getElementById("search").value.toLowerCase();

  let filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(search)
  );

  displayFiltered(filtered);
}

function displayFiltered(list) {
  let rows = "";

  list.forEach((p, index) => {
    rows += `
      <tr>
        <td>${p.name}</td>
        <td>₹ ${p.price}</td>
        <td>
          <button onclick="openEdit(${index})">Edit</button>
          <button onclick="deleteProduct(${index})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("productTable").innerHTML = rows;
}

// SORT
function sortProducts(type) {
  if (type === "low") {
    allProducts.sort((a, b) => a.price - b.price);
  } else if (type === "high") {
    allProducts.sort((a, b) => b.price - a.price);
  }
  displayProducts();
}

// DELETE
async function deleteProduct(index) {
  try {
    const product = allProducts[index];
    await apiRequest(`/products/${product._id}`, "DELETE");
    loadProducts();
  } catch (err) {
    console.log(err);
  }
}

// EDIT
function openEdit(index) {
  let product = allProducts[index];
  document.getElementById("editName").value = product.name;
  document.getElementById("editPrice").value = product.price;
  editIndex = index;
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// UPDATE
async function updateProduct() {
  try {
    const product = allProducts[editIndex];

    await apiRequest(`/products/${product._id}`, "PUT", {
      name: document.getElementById("editName").value,
      price: document.getElementById("editPrice").value
    });

    closeModal();
    loadProducts();

  } catch (err) {
    console.log(err);
  }
}

// PAGINATION
function renderPagination() {
  let totalPages = Math.ceil(allProducts.length / itemsPerPage);
  let buttons = "";

  for (let i = 1; i <= totalPages; i++) {
    buttons += `<button onclick="goToPage(${i})">${i}</button>`;
  }

  document.getElementById("pagination").innerHTML = buttons;
}

function goToPage(page) {
  currentPage = page;
  displayProducts();
}

// INIT
loadProducts();
</script>

</body>
</html>
